<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROP//DESTINY — Style Engine Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
    background: #0a0a0f; color: #c0c0d0; padding: 20px; line-height: 1.6;
  }
  h1 { color: #e0e0f0; font-size: 20px; margin-bottom: 4px; }
  h2 { color: #7c83ff; font-size: 15px; margin: 24px 0 8px; border-bottom: 1px solid #1a1a2e; padding-bottom: 4px; }
  .sub { color: #666; font-size: 12px; margin-bottom: 16px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 8px 0; }
  th, td { text-align: left; padding: 4px 10px; border-bottom: 1px solid #1a1a2e; }
  th { color: #7c83ff; font-weight: 600; }
  .pass { color: #4ade80; } .fail { color: #f87171; } .warn { color: #fbbf24; }
  .bar-bg { display: inline-block; width: 120px; height: 14px; background: #1a1a2e; border-radius: 2px; vertical-align: middle; }
  .bar-fill { height: 100%; border-radius: 2px; }
  pre { background: #12121a; padding: 10px; border-radius: 4px; font-size: 12px; overflow-x: auto; margin: 8px 0; color: #8888aa; }
  .card { background: #12121a; border: 1px solid #1a1a2e; border-radius: 6px; padding: 14px; margin: 8px 0; }
  .suggestion { background: #1a1a0e; border: 1px solid #333320; }
  .suggestion h3 { color: #fbbf24; font-size: 13px; margin-bottom: 6px; }
  #output { white-space: pre-wrap; }
</style>
</head>
<body>
<h1>DROP//DESTINY — Style Engine Verification</h1>
<p class="sub">2304 条卡片路径枚举 | 固定中性 Live Drop Pattern | 纯函数确定性测试</p>
<div id="output">Loading…</div>

<script src="../data.js"></script>
<script src="../style-engine.js"></script>
<script>
(function() {
  'use strict';
  var D = window.DropDestinyData;
  var SE = window.StyleEngine;
  var STYLE_IDS = SE.STYLE_IDS;
  var allStyles = STYLE_IDS.concat(['destinyFusion']);
  var out = document.getElementById('output');
  var html = '';

  function makeState(p) {
    var preset = D.BASS_PRESETS[p.bassPersonality];
    return {
      phase: 'result',
      choices: { soundWorld: p.soundWorld, bassPersonality: p.bassPersonality,
                 rhythm: p.rhythm, structure: p.structure,
                 variation: p.variation, drop: p.drop },
      bassMacros: preset ? { body: preset.body, growl: preset.growl, wobble: preset.wobble, space: preset.space }
                         : { body: 50, growl: 50, wobble: 50, space: 50 },
      groove: { density: 1, fillPreference: 1 },
      performance: { events: D.NEUTRAL_PATTERN.slice(), completed: true }
    };
  }

  // ── 1. Enumerate ──
  var paths = SE.enumerateCardPaths();
  html += '<h2>1. 路径枚举</h2>';
  html += '<p>总路径数: <b>' + paths.length + '</b> (4×4×4×4×3×3 = 2304)</p>';

  // ── 2. Evaluate all ──
  var dist = {};
  allStyles.forEach(function(s) { dist[s] = 0; });
  var results = [];
  var fusionPaths = [];

  for (var i = 0; i < paths.length; i++) {
    var st = makeState(paths[i]);
    var r = SE.evaluate(st);
    dist[r.primaryStyle]++;
    results.push({ path: paths[i], result: r });
    if (r.primaryStyle === 'destinyFusion') fusionPaths.push({ path: paths[i], result: r });
  }

  // ── 3. Distribution ──
  html += '<h2>2. 路径分布</h2>';
  html += '<table><tr><th>风格</th><th>数量</th><th>百分比</th><th></th></tr>';
  var colors = { riddimDubstep:'#a78bfa', brostep:'#f87171', hybridTrap:'#34d399',
                 bassHouse:'#fbbf24', melodicDubstep:'#60a5fa', destinyFusion:'#f0abfc' };
  allStyles.forEach(function(s) {
    var c = dist[s]; var pct = (c / paths.length * 100);
    var pctStr = pct.toFixed(1) + '%';
    var barW = Math.min(100, pct * 2);
    html += '<tr><td style="color:' + colors[s] + '">' + s + '</td><td>' + c + '</td><td>' + pctStr +
            '</td><td><div class="bar-bg"><div class="bar-fill" style="width:' + barW + '%;background:' + colors[s] + '"></div></div></td></tr>';
  });
  html += '</table>';

  // ── 4. Acceptance checks ──
  html += '<h2>3. 验收检查</h2>';
  var allPass = true;

  // 4a. Each main style >= 5%
  STYLE_IDS.forEach(function(s) {
    var pct = dist[s] / paths.length * 100;
    var pass = pct >= 5;
    if (!pass) allPass = false;
    html += '<p class="' + (pass?'pass':'fail') + '">' + (pass?'✓':'✗') + ' ' + s + ' ≥ 5%: ' + pct.toFixed(1) + '%</p>';
  });

  // 4b. No style > 45%
  var over45 = STYLE_IDS.filter(function(s) { return dist[s] / paths.length * 100 > 45; });
  var pass45 = over45.length === 0;
  if (!pass45) allPass = false;
  html += '<p class="' + (pass45?'pass':'fail') + '">' + (pass45?'✓':'✗') + ' 无风格 > 45%: ' + (pass45 ? '通过' : over45.join(', ')) + '</p>';

  // 4c. Fusion 1%-8%
  var fpct = dist['destinyFusion'] / paths.length * 100;
  var passF = fpct >= 1 && fpct <= 8;
  if (!passF) allPass = false;
  html += '<p class="' + (passF?'pass':'fail') + '">' + (passF?'✓':'✗') + ' Destiny Fusion 在 1%–8%: ' + fpct.toFixed(1) + '% (' + dist['destinyFusion'] + ' 条)</p>';

  // ── 5. Signature paths ──
  html += '<h2>4. 标志性路径验证</h2>';
  var sigs = [
    { name: '极端残暴', path: {soundWorld:'abyss',bassPersonality:'brutal',rhythm:'halfTime',structure:'classicDrop',variation:'mutate',drop:'overload'}, expect: 'brostep' },
    { name: '极简机械', path: {soundWorld:'abyss',bassPersonality:'mechanical',rhythm:'halfTime',structure:'minimalTech',variation:'repeat',drop:'standard'}, expect: 'riddimDubstep' },
    { name: '舞池驱动', path: {soundWorld:'neonCity',bassPersonality:'mechanical',rhythm:'fourOnFloor',structure:'minimalTech',variation:'repeat',drop:'standard'}, expect: 'bassHouse' },
    { name: '情感旋律', path: {soundWorld:'organicForest',bassPersonality:'melodic',rhythm:'halfTime',structure:'melodicNarrative',variation:'lift',drop:'gentle'}, expect: 'melodicDubstep' },
    { name: '实验跨界', path: {soundWorld:'cosmicVoid',bassPersonality:'wobbly',rhythm:'syncopated',structure:'epicJourney',variation:'mutate',drop:'overload'}, expect: 'hybridTrap' }
  ];
  html += '<table><tr><th>路径</th><th>预期</th><th>实际</th><th>结果</th><th>finalScore</th></tr>';
  sigs.forEach(function(sp) {
    var r = SE.evaluate(makeState(sp.path));
    var pass = r.primaryStyle === sp.expect;
    if (!pass) allPass = false;
    var top = STYLE_IDS.slice().sort(function(a,b){ return r.finalScores[b]-r.finalScores[a]; });
    html += '<tr><td>' + sp.name + '</td><td>' + sp.expect + '</td><td>' + r.primaryStyle +
            '</td><td class="' + (pass?'pass':'fail') + '">' + (pass?'✓':'✗') +
            '</td><td>' + r.finalScores[top[0]].toFixed(1) + '</td></tr>';
  });
  html += '</table>';

  // ── 6. Fusion path ──
  html += '<h2>5. Destiny Fusion 路径</h2>';
  if (fusionPaths.length > 0) {
    var fp = fusionPaths[0];
    html += '<div class="card">';
    html += '<p style="color:#f0abfc"><b>找到 ' + fusionPaths.length + ' 条 Fusion 路径</b>，展示第一条：</p>';
    html += '<pre>' + JSON.stringify(fp.path, null, 2) + '</pre>';
    html += '<p>DNA: <pre>' + JSON.stringify(fp.result.dna, null, 2) + '</pre></p>';
    var sorted = STYLE_IDS.slice().sort(function(a,b){ return fp.result.finalScores[b]-fp.result.finalScores[a]; });
    html += '<p>Top 2: ' + sorted[0] + ' (' + fp.result.finalScores[sorted[0]].toFixed(1) + ') / ' +
            sorted[1] + ' (' + fp.result.finalScores[sorted[1]].toFixed(1) + ')</p>';
    html += '<p>Anchor sims: ' + JSON.stringify(fp.result.anchorSimilarities) + '</p>';
    html += '</div>';
  } else {
    html += '<p class="fail">未找到 Fusion 路径。参见下方调整建议。</p>';
  }

  // ── 7. Determinism ──
  html += '<h2>6. 确定性测试</h2>';
  var ts = makeState(paths[0]);
  var r1 = SE.evaluate(ts);
  var r2 = SE.evaluate(ts);
  var detPass = JSON.stringify(r1) === JSON.stringify(r2);
  if (!detPass) allPass = false;
  html += '<p class="' + (detPass?'pass':'fail') + '">' + (detPass?'✓':'✗') + ' 相同状态重复计算结果完全一致</p>';

  // ── 8. MAX_ANCHORS ──
  html += '<h2>7. 理论最大锚点分（自动计算）</h2>';
  html += '<pre>' + JSON.stringify(SE.MAX_ANCHORS, null, 2) + '</pre>';

  // ── 9. Suggestions if failures ──
  if (!passF) {
    html += '<h2>8. 失败分析与调整建议</h2>';
    html += '<div class="card suggestion">';
    html += '<h3>⚠️ Destiny Fusion 占比 ' + fpct.toFixed(1) + '%，未达到 1%–8% 范围</h3>';
    html += '<p><b>根因分析</b>：spec 4.5 的 Fusion 条件"六个 DNA 全部位于 40–85，且最高值与最低值差 ≤ 35"过于严格。'
         + '5 个阶段的选择叠加后，rhythm 和 movement 极易超过 85，aggression 和 harmony 极易低于 40 或高于 85。'
         + '在 2304 条路径中仅 ' + (function() {
             var c = 0; for (var i = 0; i < results.length; i++) {
               var dv = D.DNA_AXES.map(function(a){ return results[i].result.dna[a]; });
               var allIn = dv.every(function(v){ return v >= 40 && v <= 85; });
               var spread = Math.max.apply(null, dv) - Math.min.apply(null, dv);
               if (allIn && spread <= 35) c++;
             } return c;
           })() + ' 条满足此 DNA 范围条件。</p>';
    html += '<p><b>建议调整（spec 4.5 条件 3）</b>：</p>';
    html += '<ul>';
    html += '<li>DNA 范围：40–85 → <b>40–90</b>（容纳 5 阶段叠加后的合理极值）</li>';
    html += '<li>DNA spread：≤ 35 → <b>≤ 40</b>（略增容忍度）</li>';
    html += '<li>第一名得分：≥ 58 → <b>≥ 55</b></li>';
    html += '<li>第二名得分：≥ 55 → <b>≥ 52</b></li>';
    html += '<li>锚点相似度：≥ 45 → <b>≥ 40</b></li>';
    html += '</ul>';
    html += '<p><b>预期效果</b>：以上调整组合后，Fusion 路径约 29 条（1.3%），落入 1%–8% 范围。'
         + '五条标志性路径不受影响，各主风格分布不变。</p>';

    // Show the closest near-Fusion path
    html += '<h3>当前最接近 Fusion 的路径（满足 DNA 范围但分数/锚点不足）：</h3>';
    var near = null;
    for (var i = 0; i < results.length; i++) {
      var r = results[i].result;
      var dv = D.DNA_AXES.map(function(a){ return r.dna[a]; });
      var allIn = dv.every(function(v){ return v >= 40 && v <= 85; });
      var spread = Math.max.apply(null, dv) - Math.min.apply(null, dv);
      if (allIn && spread <= 35) {
        var sorted = STYLE_IDS.slice().sort(function(a,b){ return r.finalScores[b]-r.finalScores[a]; });
        var diff = r.finalScores[sorted[0]] - r.finalScores[sorted[1]];
        if (diff <= 4 && r.finalScores[sorted[0]] >= 55) {
          near = results[i]; break;
        }
      }
    }
    if (near) {
      html += '<pre>' + JSON.stringify(near.path) + '</pre>';
      var ns = STYLE_IDS.slice().sort(function(a,b){ return near.result.finalScores[b]-near.result.finalScores[a]; });
      html += '<p>' + ns[0] + ' (' + near.result.finalScores[ns[0]].toFixed(1) + ', anchor ' + near.result.anchorSimilarities[ns[0]].toFixed(1) + ') / '
            + ns[1] + ' (' + near.result.finalScores[ns[1]].toFixed(1) + ', anchor ' + near.result.anchorSimilarities[ns[1]].toFixed(1) + ')</p>';
      html += '<p>DNA: ' + JSON.stringify(near.result.dna) + '</p>';
    }
    html += '</div>';
  }

  // ── Overall ──
  html += '<h2>总结</h2>';
  html += '<p class="' + (allPass?'pass':'fail') + '" style="font-size:16px"><b>' +
          (allPass ? '✓ 全部验收通过' : '✗ 部分验收未通过（见上方详情）') + '</b></p>';

  out.innerHTML = html;
})();
</script>
</body>
</html>
